name: Build Android APK

# on: [push, pull_request]

on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: 3.12
    - name: check java python version and PATH
      run: |
        java -version
        python --version
        echo $PATH
    - name: set ENV
      run: |
        echo $ANDROID_HOME >> "$GITHUB_PATH"
        echo $ANDROID_HOME/cmdline-tools/latest/bin >> "$GITHUB_PATH"
        echo $ANDROID_HOME/platform-tools >> "$GITHUB_PATH"
        echo $ANDROID_NDK_HOME >> "$GITHUB_PATH"
    - name: check PATH
      run: |
        echo $PATH
    - name: build
      run: |
        if [ ! -f "gradlew" ]; then gradle wrapper --gradle-version 9.4.1; fi
        chmod +x gradlew
        ./gradlew assembleDebug --stacktrace
    - name: Upload file
      uses: actions/upload-artifact@v7
      with:
        name: output_file
        path: |
              ./build/outputs/*
        if-no-files-found: error
