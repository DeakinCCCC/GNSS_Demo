plugins {
    id 'com.android.application' version '8.8.0'
	id 'com.chaquo.python' version '17.0.0'
}

android {
    namespace = "com.example.gnssdemo"
    compileSdkVersion 34
    defaultConfig {
        applicationId "com.example.gnssdemo"
        minSdkVersion 24
        targetSdkVersion 34
        versionCode 1
        versionName "1.0"
		ndk {
            abiFilters "arm64-v8a"
            //abiFilters "armeabi-v7a", "arm64-v8a", "x86", "x86_64"
        }
    }
    
    buildTypes {}
}

chaquopy {
    defaultConfig {
		version = "3.12"
        pip {
            install "numpy"
			//install "pyrtklib5"
        }
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.4.2'
}
